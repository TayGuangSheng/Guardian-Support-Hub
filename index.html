<!DOCTYPE html>
<html lang="en-SG">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="theme-color-meta" name="theme-color" content="#ffffff">
  <meta
    name="description"
    content="Guardian Support Hub for Digital and Intelligence Service HR enquiries and support."
  >
  <title>Guardian Support Hub | Digital and Intelligence Service</title>
  <link
    rel="icon"
    type="image/png"
    sizes="64x64"
    href="assets/dis-favicon.png?v=c3fd7ec"
  >
  <script>
    (function () {
      "use strict";

      var storageKey = "guardian-support-hub-theme";
      var theme = "light";

      try {
        theme = window.localStorage.getItem(storageKey) || "light";
      } catch (error) {
        theme = "light";
      }

      theme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = theme;
      if (theme === "dark") {
        document.documentElement.classList.add("sgds-night-theme");
      }
    }());
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://webchat.vica.gov.sg" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,600;0,14..32,700;1,14..32,300;1,14..32,400;1,14..32,600;1,14..32,700&display=swap"
    rel="stylesheet"
  >

  <!-- SGDS foundation files. The product theme overrides follow these imports. -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@govtechsg/sgds-web-component@3.21.0/themes/day.css"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@govtechsg/sgds-web-component@3.21.0/themes/night.css"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@govtechsg/sgds-web-component@3.21.0/css/sgds.css"
  >
  <link
    href="https://webchat.vica.gov.sg/static/css/chat.css"
    referrerpolicy="origin"
    rel="stylesheet"
  >
  <style>
    :root {
      /* DIS orange mapped to the complete SGDS product colour scale. */
      --sgds-product-primary-100: #fff1ec;
      --sgds-product-primary-200: #ffd8ca;
      --sgds-product-primary-300: #ffb69d;
      --sgds-product-primary-400: #ff8a62;
      --sgds-product-primary-500: #f15a24;
      --sgds-product-primary-600: #d44c00;
      --sgds-product-primary-700: #b43b0f;
      --sgds-product-primary-800: #8f2d08;
      --sgds-product-primary-900: #6e2105;
      --sgds-font-family-brand: "Inter", system-ui, sans-serif;
      --dis-orange: #f15a24;
      --dis-orange-dark: #b43b0f;
      --dis-black: #111111;
      --accent-text: #b43b0f;
      --surface-subtle: #f7f7f7;
      --surface-default: #ffffff;
      --surface-muted: #fafafa;
      --border-default: #b8b8b8;
      --border-subtle: #e0e0e0;
      --border-light: #e8e8e8;
      --text-default: #1a1a1a;
      --text-subtle: #525252;
      --focus-ring: #60aaf4;
      --chat-gradient: rgb(241 90 36 / 4%);
      --notice-surface: var(--sgds-product-primary-100);
      --notice-border: var(--sgds-product-primary-300);
      --notice-text: var(--sgds-product-primary-900);
      --prompt-hover-surface: var(--sgds-product-primary-100);
      --avatar-surface-end: #ffffff;
      --placeholder-text: #686868;
      --link-text: #0269d0;
      --selection-text: var(--dis-black);
    }

    :root.sgds-night-theme {
      color-scheme: dark;
      --accent-text: #ffb69d;
      --surface-subtle: #0f1117;
      --surface-default: #161a22;
      --surface-muted: #20242d;
      --border-default: #6f7684;
      --border-subtle: #343b48;
      --border-light: #2b313d;
      --text-default: #f5f7fb;
      --text-subtle: #c2c8d3;
      --focus-ring: #8ec5ff;
      --chat-gradient: rgb(241 90 36 / 12%);
      --notice-surface: #2a1812;
      --notice-border: #8f2d08;
      --notice-text: #ffd8ca;
      --prompt-hover-surface: #241b18;
      --avatar-surface-end: #161a22;
      --placeholder-text: #a9b0bd;
      --link-text: #8ec5ff;
      --selection-text: #111111;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface-default);
      color: var(--text-default);
      font-family: var(--sgds-font-family-brand);
      font-size: 1rem;
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    :focus-visible {
      outline: 0.25rem solid var(--focus-ring);
      outline-offset: 0.125rem;
    }

    .visually-hidden {
      position: absolute !important;
      width: 0.0625rem !important;
      height: 0.0625rem !important;
      padding: 0 !important;
      margin: -0.0625rem !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    .skip-link {
      position: fixed;
      top: 0.5rem;
      left: 0.5rem;
      z-index: 10000;
      padding: 0.75rem 1rem;
      border-radius: var(--sgds-border-radius-md, 0.5rem);
      background: var(--dis-black);
      color: #ffffff;
      font-weight: 600;
      transform: translateY(-180%);
      transition: transform 160ms ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .app-header {
      position: relative;
      z-index: 10;
      flex: 0 0 auto;
    }

    sgds-masthead,
    sgds-mainnav {
      display: block;
    }

    sgds-mainnav {
      border-bottom: 0.25rem solid var(--dis-orange);
    }

    sgds-masthead:not(:defined) {
      min-height: 2rem;
      background: var(--surface-subtle);
    }

    sgds-mainnav:not(:defined) {
      min-height: 5.25rem;
      background: var(--surface-default);
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 1.25rem;
      min-width: 0;
      color: var(--text-default);
    }

    .brand-logo {
      display: block;
      flex: 0 0 auto;
      width: clamp(8.5rem, 12vw, 10.625rem);
      height: auto;
    }

    .brand-logo--dark {
      display: none;
      height: clamp(3.25rem, 4.588vw, 4.0625rem);
      object-fit: cover;
      object-position: center;
    }

    :root.sgds-night-theme .brand-logo--light {
      display: none;
    }

    :root.sgds-night-theme .brand-logo--dark {
      display: block;
    }

    .brand-title {
      color: var(--text-default);
      font-size: clamp(1.5rem, 2vw, 1.875rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.15;
      white-space: nowrap;
    }

    .chat-main {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 14rem;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, var(--chat-gradient), transparent 9rem),
        var(--surface-subtle);
    }

    .chat-workspace {
      display: flex;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .support-panel {
      width: clamp(17rem, 22vw, 20rem);
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 0.0625rem solid var(--border-subtle);
      background: var(--surface-default);
      padding: 1.25rem;
    }

    .support-panel__content {
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 0.25rem;
      margin-right: -0.25rem;
    }

    .support-panel h2 {
      margin: 0;
      color: var(--text-default);
      line-height: 1.3;
    }

    .support-panel h2 {
      font-size: 1.125rem;
    }

    .support-panel p {
      margin: 0.5rem 0 0;
      color: var(--text-subtle);
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .support-panel__new-chat {
      margin-bottom: 1.25rem;
    }

    .support-panel__new-chat-status {
      min-height: 1.25rem;
      margin-top: 0.5rem;
      color: var(--accent-text);
      font-size: 0.8125rem;
      font-weight: 600;
    }

    .support-panel__new-chat-status:empty {
      display: none;
    }

    .support-panel__section + .support-panel__section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 0.0625rem solid var(--border-light);
    }

    .support-panel__recent-empty {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: start;
      gap: 0.625rem;
      margin-top: 0.75rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      background: var(--surface-muted);
      color: var(--text-subtle);
    }

    .support-panel__recent-empty p {
      margin: 0;
    }

    .support-panel__recent-empty strong {
      display: block;
      margin-bottom: 0.125rem;
      color: var(--text-default);
      font-size: 0.875rem;
    }

    .support-panel__recent-empty span {
      display: block;
      font-size: 0.8125rem;
      line-height: 1.4;
    }

    .support-panel__prompt-list {
      display: grid;
      gap: 0.5rem;
      margin: 1rem 0 0;
      padding: 0;
      list-style: none;
    }

    .support-panel__prompt {
      width: 100%;
      min-height: 2.75rem;
      padding: 0.625rem 0.75rem;
      border: 0.0625rem solid var(--border-subtle);
      border-radius: 0.5rem;
      background: var(--surface-default);
      color: var(--text-default);
      font: inherit;
      font-size: 0.875rem;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
    }

    .support-panel__prompt:hover {
      border-color: var(--dis-orange-dark);
      background: var(--prompt-hover-surface);
    }

    .support-panel__prompt:focus-visible {
      border-color: var(--dis-orange-dark);
      outline: 0.25rem solid var(--focus-ring);
      outline-offset: 0.125rem;
    }

    .support-panel__status {
      min-height: 1.25rem;
      margin-top: 0.625rem;
      color: var(--accent-text);
      font-size: 0.8125rem;
      font-weight: 600;
    }

    .support-panel__profile-wrap {
      flex: 0 0 auto;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 0.0625rem solid var(--border-light);
    }

    .support-panel__profile {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 0.75rem;
      min-height: 4.25rem;
      padding: 0.75rem 0.875rem;
      border: 0.0625rem solid var(--border-subtle);
      border-radius: 0.75rem;
      background: var(--surface-muted);
    }

    .support-panel__avatar {
      width: 2.75rem;
      height: 2.75rem;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 0.125rem solid var(--sgds-product-primary-200);
      border-radius: 50%;
      background:
        linear-gradient(135deg, var(--sgds-product-primary-100), var(--avatar-surface-end));
      color: var(--accent-text);
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .support-panel__profile-text {
      min-width: 0;
      height: 2.75rem;
      display: grid;
      align-items: center;
    }

    .support-panel__profile-name {
      height: 100%;
      margin: 0 !important;
      margin-block: 0 !important;
      display: flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-default);
      font-size: 0.9375rem;
      font-weight: 700;
      line-height: 1;
    }

    .chat-surface {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    /*
     * VICA is designed as a floating widget. These rules pin its conversation
     * canvas to the remaining viewport area beneath the SGDS application shell.
     */
    #webchat {
      position: relative !important;
      inset: auto !important;
      width: 100% !important;
      max-width: none !important;
      height: 100% !important;
      max-height: none !important;
      min-width: 0 !important;
      min-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background: var(--surface-subtle) !important;
      color: var(--text-default);
      font-family: var(--sgds-font-family-brand) !important;
    }

    #webchat > #CONVERSATION_HISTORY,
    #webchat > .vica-chat-container,
    #webchat > .webchat-container {
      position: relative !important;
      inset: auto !important;
      width: 100% !important;
      max-width: none !important;
      height: 100% !important;
      max-height: none !important;
      min-width: 0 !important;
      min-height: 0 !important;
      margin: 0 !important;
      border: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    #webchat .vica-chat-container,
    #webchat .webchat-container,
    #webchat [role="dialog"] {
      width: 100% !important;
      max-width: none !important;
      height: 100% !important;
      max-height: none !important;
      border-radius: 0 !important;
    }

    /*
     * VICA maps the app-* attributes below to message colours. These semantic
     * fallbacks keep its controls aligned with SGDS if generated classes change.
     */
    #webchat textarea,
    #webchat input[type="text"],
    #webchat input:not([type]) {
      min-height: 3rem !important;
      border: 0.0625rem solid var(--border-default) !important;
      border-radius: var(--sgds-border-radius-md, 0.5rem) !important;
      background: var(--surface-default) !important;
      color: var(--text-default) !important;
      caret-color: var(--dis-orange-dark) !important;
      font-family: var(--sgds-font-family-brand) !important;
    }

    #webchat textarea::placeholder,
    #webchat input::placeholder {
      color: var(--placeholder-text) !important;
      opacity: 1;
    }

    #webchat textarea:focus,
    #webchat input[type="text"]:focus,
    #webchat input:not([type]):focus {
      border-color: var(--dis-orange-dark) !important;
      outline: 0.25rem solid var(--focus-ring) !important;
      outline-offset: 0.125rem !important;
    }

    #webchat button {
      min-width: 2.75rem;
      min-height: 2.75rem;
      border-color: var(--dis-orange-dark) !important;
      border-radius: var(--sgds-border-radius-md, 0.5rem) !important;
      background-color: var(--dis-orange-dark) !important;
      color: #ffffff !important;
      font-family: var(--sgds-font-family-brand) !important;
    }

    #webchat button:hover:not(:disabled) {
      border-color: var(--sgds-product-primary-800) !important;
      background-color: var(--sgds-product-primary-800) !important;
    }

    #webchat button:focus-visible {
      outline: 0.25rem solid var(--focus-ring) !important;
      outline-offset: 0.125rem !important;
    }

    #webchat button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    #webchat a {
      color: var(--link-text) !important;
      text-decoration: underline;
      text-underline-offset: 0.1875rem;
    }

    #webchat ::selection {
      background: var(--sgds-product-primary-200);
      color: var(--selection-text);
    }

    .chat-loader {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: var(--surface-subtle);
      opacity: 1;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .chat-loader[hidden] {
      display: none;
    }

    .chat-loader__content {
      width: calc(100vw - 3rem);
      max-width: 20rem;
      min-width: 0;
      color: var(--text-subtle);
      text-align: center;
    }

    .chat-loader__content p {
      margin: 0.75rem 0 0;
      font-size: 0.875rem;
      overflow-wrap: anywhere;
    }

    .chat-loader sgds-spinner[hidden] {
      display: none !important;
    }

    .vica-ready .chat-loader {
      visibility: hidden;
      opacity: 0;
    }

    .noscript-message {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      color: var(--text-default);
      text-align: center;
    }

    @media (max-width: 48rem) {
      .brand-lockup {
        gap: 0.75rem;
      }

      .brand-logo {
        width: 7rem;
      }

      .brand-logo--dark {
        height: 2.676rem;
      }

      .brand-title {
        font-size: 1.375rem;
      }

    }

    @media (max-width: 36rem) {
      .brand-lockup {
        gap: 0.625rem;
      }

      .brand-logo {
        width: 5.75rem;
      }

      .brand-logo--dark {
        height: 2.199rem;
      }

      .brand-title {
        font-size: 1.125rem;
      }

      #webchat button {
        min-width: 3rem;
        min-height: 3rem;
      }

    }

    @media (max-width: 64rem) {
      .chat-workspace {
        flex-direction: column;
      }

      .support-panel {
        width: 100%;
        max-height: 15rem;
        border-right: 0;
        border-bottom: 0.0625rem solid var(--border-subtle);
        padding: 1rem;
      }

      .support-panel__prompt-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-height: 42rem) and (orientation: landscape) {
      .chat-main {
        min-height: 10rem;
      }

      .support-panel {
        max-height: 10rem;
      }
    }

    @media (max-width: 36rem) {
      .support-panel__prompt-list {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    @media print {
      body::before {
        content: "Guardian Support Hub chat is available online.";
        display: block;
        padding: 1rem;
        color: #000000;
      }

      .app-header,
      .chat-main {
        display: none;
      }
    }
  </style>

  <script
    defer
    src="https://cdn.jsdelivr.net/npm/@govtechsg/sgds-web-component@3.21.0/index.umd.min.js"
  ></script>
</head>

<body>
  <a class="skip-link" href="#webchat">Skip to chat</a>

  <header class="app-header">
    <sgds-masthead fluid></sgds-masthead>

    <sgds-mainnav
      fluid
      expand="always"
      brandHref="https://www.dis.gov.sg/"
    >
      <span class="brand-lockup" slot="brand">
        <img
          class="brand-logo brand-logo--light"
          width="340"
          height="130"
          alt="Digital and Intelligence Service"
          src="assets/dis-logo.png"
        >
        <img
          class="brand-logo brand-logo--dark"
          width="340"
          height="130"
          alt="Digital and Intelligence Service"
          src="assets/dis-logo-dark.png?v=c3fd7ec"
        >
        <span class="brand-title">Guardian Support Hub</span>
      </span>

      <sgds-icon-button
        id="theme-toggle"
        slot="end"
        name="moon"
        size="lg"
        tone="neutral"
        variant="ghost"
        ariaLabel="Switch to dark theme"
        title="Switch to dark theme"
      ></sgds-icon-button>
    </sgds-mainnav>
  </header>

  <main class="chat-main" aria-labelledby="page-title">
    <h1 id="page-title" class="visually-hidden">Guardian Support Hub</h1>

    <div class="chat-workspace">
      <aside class="support-panel" aria-label="Chat navigation">
        <div class="support-panel__content">
          <div class="support-panel__new-chat">
            <sgds-button
              id="new-chat-button"
              fullWidth
              variant="outline"
              tone="neutral"
              ariaLabel="Start a new chat"
              disabled
            >
              <sgds-icon slot="leftIcon" name="plus"></sgds-icon>
              New chat
            </sgds-button>
            <p
              id="new-chat-status"
              class="support-panel__new-chat-status"
              aria-live="polite"
            ></p>
          </div>

          <section
            class="support-panel__section"
            aria-labelledby="recent-chats-title"
          >
            <h2 id="recent-chats-title">Recent</h2>
            <div class="support-panel__recent-empty">
              <sgds-icon name="chat-left-text" size="md"></sgds-icon>
              <p>
                <strong>No saved chats</strong>
                <span>Secure history will be added with Singpass sign-in.</span>
              </p>
            </div>
          </section>

          <section
            class="support-panel__section"
            aria-labelledby="support-panel-title"
          >
            <h2 id="support-panel-title">Quick links</h2>
            <ul class="support-panel__prompt-list">
              <li>
                <button
                  class="support-panel__prompt"
                  type="button"
                  data-copy-prompt="How do I apply for leave?"
                >How do I apply for leave?</button>
              </li>
              <li>
                <button
                  class="support-panel__prompt"
                  type="button"
                  data-copy-prompt="Where can I find HR policies?"
                >Where can I find HR policies?</button>
              </li>
              <li>
                <button
                  class="support-panel__prompt"
                  type="button"
                  data-copy-prompt="Who can I contact about my benefits?"
                >Who can I contact about my benefits?</button>
              </li>
              <li>
                <button
                  class="support-panel__prompt"
                  type="button"
                  data-copy-prompt="How do I update my personal details?"
                >How do I update my personal details?</button>
              </li>
            </ul>
            <p
              id="prompt-copy-status"
              class="support-panel__status"
              aria-live="polite"
            ></p>
          </section>
        </div>

        <div
          class="support-panel__profile-wrap"
          aria-label="Signed-in profile"
        >
          <div class="support-panel__profile">
            <div class="support-panel__avatar" aria-hidden="true">TG</div>
            <div class="support-panel__profile-text">
              <p class="support-panel__profile-name">Tay Guang Sheng</p>
            </div>
          </div>
        </div>
      </aside>

      <section class="chat-surface" aria-label="Guardian Support Hub chat">
        <div
          id="webchat"
          app-id="ask-dis-hr"
          app-layout="fullscreen"
          app-widget-position="relative"
          app-environment-override="production"
          app-name="Guardian Support Hub"
          app-font-family="Inter"
          app-color="#B43B0F"
          app-fullscreen-height-offset="112"
          app-message-scroll-offset="112"
          app-position-fixed="false"
          app-remove-minimize-button="true"
          app-remove-rounded-corner="true"
          app-height="100%"
          app-width="100%"
        ></div>

        <div id="chat-loader" class="chat-loader" role="status" aria-live="polite">
          <div class="chat-loader__content">
            <sgds-spinner
              id="chat-loader-spinner"
              size="lg"
              tone="brand"
            ></sgds-spinner>
            <p id="chat-loader-text">Connecting to Guardian Support Hub...</p>
          </div>
        </div>

        <noscript>
          <div class="noscript-message">
            JavaScript is required to connect to Guardian Support Hub.
          </div>
        </noscript>
      </section>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      var host;
      var loader;
      var loaderSpinner;
      var loaderText;
      var observer;
      var ready = false;
      var failed = false;
      var lastMaximizeAt = 0;
      var themeToggle;
      var themeColorMeta;
      var newChatButton;
      var newChatStatus;
      var themeStorageKey = "guardian-support-hub-theme";

      function currentTheme() {
        return document.documentElement.dataset.theme === "dark" ?
          "dark" : "light";
      }

      function applyTheme(theme, shouldPersist) {
        var isDark = theme === "dark";

        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("sgds-night-theme", isDark);

        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", isDark ? "#0f1117" : "#ffffff");
        }

        if (themeToggle) {
          var toggleLabel = isDark ?
            "Switch to light theme" : "Switch to dark theme";

          themeToggle.setAttribute("name", isDark ? "sun" : "moon");
          themeToggle.ariaLabel = toggleLabel;
          themeToggle.setAttribute("title", toggleLabel);
        }

        if (host) {
          host.setAttribute("data-theme", theme);
          patchVICAShadowLayout();
        }

        if (shouldPersist) {
          try {
            window.localStorage.setItem(themeStorageKey, theme);
          } catch (error) {
            return;
          }
        }
      }

      function initialiseThemeToggle() {
        themeToggle = document.getElementById("theme-toggle");
        themeColorMeta = document.getElementById("theme-color-meta");

        applyTheme(currentTheme(), false);

        if (!themeToggle) {
          return;
        }

        themeToggle.addEventListener("click", function () {
          applyTheme(currentTheme() === "dark" ? "light" : "dark", true);
        });
      }

      function dispatchMaximize(target) {
        if (!target || typeof target.dispatchEvent !== "function") {
          return;
        }

        target.dispatchEvent(new CustomEvent("VAMaximize", {
          bubbles: true,
          cancelable: true
        }));
      }

      // VICA normally starts as a launcher. Re-dispatching its public event
      // during startup keeps the embedded experience permanently expanded.
      function forceVICAFullPage() {
        var now = Date.now();
        if (now - lastMaximizeAt < 200) {
          return;
        }

        lastMaximizeAt = now;
        dispatchMaximize(document.body);
        dispatchMaximize(host);
      }

      function syncVICAFullscreenOffset() {
        var header = document.querySelector(".app-header");
        if (!host) {
          return;
        }

        var topOffset = Math.ceil(host.getBoundingClientRect().top);
        if (!topOffset && header) {
          topOffset = Math.ceil(header.getBoundingClientRect().height);
        }

        topOffset = Math.max(topOffset, 0);
        host.setAttribute("app-fullscreen-height-offset", String(topOffset));
        host.setAttribute("app-message-scroll-offset", String(topOffset));
        host.style.setProperty("--guardian-vica-top-offset", topOffset + "px");
      }

      function initialisePromptCopy() {
        var status = document.getElementById("prompt-copy-status");
        var buttons = document.querySelectorAll("[data-copy-prompt]");

        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            var prompt = button.getAttribute("data-copy-prompt") ||
              button.textContent.trim();

            function markCopied() {
              if (status) {
                status.textContent = "Copied. Paste it into the chat.";
              }
            }

            function showPrompt() {
              if (status) {
                status.textContent = prompt;
              }
            }

            if (navigator.clipboard && window.isSecureContext) {
              navigator.clipboard.writeText(prompt).then(markCopied, showPrompt);
              return;
            }

            showPrompt();
          });
        });
      }

      function findVICAAction(label) {
        if (!host || !host.shadowRoot) {
          return null;
        }

        var labels = Array.from(host.shadowRoot.querySelectorAll("span"));
        var actionLabel = labels.find(function (element) {
          return element.textContent.trim() === label;
        });

        return actionLabel ? actionLabel.parentElement : null;
      }

      function requestNewChat() {
        var restartAction = findVICAAction("End & restart chat");

        if (!restartAction) {
          if (newChatStatus) {
            newChatStatus.textContent =
              "The chat is still loading. Please try again shortly.";
          }
          return;
        }

        if (newChatStatus) {
          newChatStatus.textContent = "";
        }

        restartAction.click();
      }

      function initialiseChatNavigation() {
        newChatButton = document.getElementById("new-chat-button");
        newChatStatus = document.getElementById("new-chat-status");

        if (!newChatButton) {
          return;
        }

        newChatButton.addEventListener("click", requestNewChat);
      }

      function patchVICAShadowLayout() {
        if (!host || !host.shadowRoot ||
            host.shadowRoot.getElementById("guardian-vica-layout-patch")) {
          return;
        }

        var style = document.createElement("style");
        style.id = "guardian-vica-layout-patch";
        style.textContent = [
          ":host([data-theme=\"dark\"]),",
          ":host([data-theme=\"dark\"]) #vica-shadow-container {",
          "  --vica-background: #0f1117;",
          "  --vica-foreground: #f5f7fb;",
          "  --vica-card: #161a22;",
          "  --vica-card-foreground: #f5f7fb;",
          "  --vica-popover: #161a22;",
          "  --vica-popover-foreground: #f5f7fb;",
          "  --vica-muted: #20242d;",
          "  --vica-muted-foreground: #c2c8d3;",
          "  --vica-border: #343b48;",
          "  --vica-input: #343b48;",
          "  --vica-ring: #8ec5ff;",
          "  --vica-neutralDefault: #f5f7fb;",
          "  --vica-neutral1: #f5f7fb;",
          "  --vica-neutral2: #d9dee8;",
          "  --vica-neutral3: #c2c8d3;",
          "  --vica-neutral4: #a9b0bd;",
          "  --vica-neutral5: #343b48;",
          "  --vica-neutral7: #20242d;",
          "  --vica-neutral8: #161a22;",
          "  --vica-accent: #241b18;",
          "  --vica-accentLight: #2a1812;",
          "  --vica-accentLightest: #0f1117;",
          "  --vica-color-primary-accent-light: #2a1812;",
          "  --vica-color-primary-accent-lightest: #0f1117;",
          "}",
          ":host([data-theme=\"dark\"]) #vica-shadow-container {",
          "  color: #f5f7fb;",
          "}",
          ":host([data-theme=\"dark\"]) .bg-white,",
          ":host([data-theme=\"dark\"]) .bg-accentLightest {",
          "  background-color: #161a22 !important;",
          "}",
          ":host([data-theme=\"dark\"]) .self-end[class*=\"bg-\"],",
          ":host([data-theme=\"dark\"]) .self-end [class*=\"bg-\"],",
          ":host([data-theme=\"dark\"]) .ml-auto[class*=\"bg-\"],",
          ":host([data-theme=\"dark\"]) .ml-auto [class*=\"bg-\"] {",
          "  background-color: #b43b0f !important;",
          "}",
          ":host([data-theme=\"dark\"]) .self-end,",
          ":host([data-theme=\"dark\"]) .self-end *,",
          ":host([data-theme=\"dark\"]) .ml-auto[class*=\"bg-\"],",
          ":host([data-theme=\"dark\"]) .ml-auto[class*=\"bg-\"] *,",
          ":host([data-theme=\"dark\"]) .ml-auto [class*=\"bg-\"],",
          ":host([data-theme=\"dark\"]) .ml-auto [class*=\"bg-\"] * {",
          "  color: #ffffff !important;",
          "}",
          ":host([data-theme=\"dark\"]) .self-end .text-n3,",
          ":host([data-theme=\"dark\"]) .self-end .text-neutral3,",
          ":host([data-theme=\"dark\"]) .self-end [class*=\"text-n3\"],",
          ":host([data-theme=\"dark\"]) .self-end time,",
          ":host([data-theme=\"dark\"]) .ml-auto .text-n3,",
          ":host([data-theme=\"dark\"]) .ml-auto .text-neutral3,",
          ":host([data-theme=\"dark\"]) .ml-auto [class*=\"text-n3\"],",
          ":host([data-theme=\"dark\"]) .ml-auto time {",
          "  color: #ffe0d4 !important;",
          "}",
          ":host([data-theme=\"dark\"]) .border-gray-300 {",
          "  border-color: #343b48 !important;",
          "}",
          ":host([data-theme=\"dark\"]) .text-n1,",
          ":host([data-theme=\"dark\"]) .text-neutralDefault,",
          ":host([data-theme=\"dark\"]) .text-neutral1 {",
          "  color: #f5f7fb !important;",
          "}",
          ":host([data-theme=\"dark\"]) .text-n3,",
          ":host([data-theme=\"dark\"]) .text-neutral3,",
          ":host([data-theme=\"dark\"]) .text-gray-700 {",
          "  color: #c2c8d3 !important;",
          "}",
          ":host([data-theme=\"dark\"]) textarea,",
          ":host([data-theme=\"dark\"]) input {",
          "  background-color: #20242d !important;",
          "  color: #f5f7fb !important;",
          "}",
          ":host([data-theme=\"dark\"]) textarea::placeholder,",
          ":host([data-theme=\"dark\"]) input::placeholder {",
          "  color: #a9b0bd !important;",
          "}",
          "#vica-shadow-container [class*=\"min-h-[calc(100dvh-448px)]\"] {",
          "  min-height: max(0px, calc(100dvh - var(--guardian-vica-top-offset, 0px) - 456px)) !important;",
          "}",
          "@media (max-width: 48rem) {",
          "  .gsib-min-w-424 { min-width: 0 !important; }",
          "  #vica-shadow-container {",
          "    width: 100% !important;",
          "    max-width: 100% !important;",
          "    overflow-x: hidden;",
          "  }",
          "  #vica-shadow-container * {",
          "    box-sizing: border-box;",
          "    max-width: 100%;",
          "  }",
          "  #vica-shadow-container h1,",
          "  #vica-shadow-container h2,",
          "  #vica-shadow-container p {",
          "    white-space: normal !important;",
          "    overflow-wrap: break-word;",
          "  }",
          "}"
        ].join("\n");

        host.shadowRoot.appendChild(style);
      }

      function getCanvas() {
        if (!host) {
          return null;
        }

        return host.querySelector(
          '[id*="CONVERSATION"], [id*="conversation"], [role="dialog"]'
        );
      }

      function canvasIsHidden() {
        var canvas = getCanvas();
        return canvas && window.getComputedStyle(canvas).display === "none";
      }

      function chatIsReady() {
        if (!host) {
          return false;
        }

        return Boolean(
          host.querySelector(
            'textarea, input[type="text"], [contenteditable="true"], [role="log"]'
          )
        );
      }

      function hideLoader() {
        if (ready) {
          return;
        }

        ready = true;
        document.documentElement.classList.add("vica-ready");

        if (newChatButton) {
          newChatButton.disabled = false;
          newChatButton.removeAttribute("disabled");
        }

        if (loader) {
          loader.setAttribute("aria-live", "off");
        }

        window.setTimeout(function () {
          if (loader) {
            loader.hidden = true;
          }
        }, 260);
      }

      function markReady() {
        if (ready || !chatIsReady()) {
          return;
        }

        hideLoader();
      }

      function watchVICA() {
        if (!host || observer) {
          return;
        }

        var mutationTimer;
        observer = new MutationObserver(function () {
          window.clearTimeout(mutationTimer);
          mutationTimer = window.setTimeout(function () {
            markReady();

            if (!ready || canvasIsHidden()) {
              forceVICAFullPage();
            }
          }, 80);
        });

        observer.observe(host, {
          attributes: true,
          childList: true,
          subtree: true,
          attributeFilter: ["class", "hidden", "style"]
        });
      }

      function blockMinimize(event) {
        if (event && event.cancelable) {
          event.preventDefault();
        }

        window.setTimeout(forceVICAFullPage, 0);
      }

      function scheduleStartupMaximizes() {
        [0, 250, 750, 1500, 3000, 6000].forEach(function (delay) {
          window.setTimeout(function () {
            patchVICAShadowLayout();
            forceVICAFullPage();
            markReady();
          }, delay);
        });
      }

      function initialiseVICAFrame() {
        host = document.getElementById("webchat");
        loader = document.getElementById("chat-loader");
        loaderSpinner = document.getElementById("chat-loader-spinner");
        loaderText = document.getElementById("chat-loader-text");

        initialiseThemeToggle();
        initialiseChatNavigation();
        initialisePromptCopy();
        patchVICAShadowLayout();
        syncVICAFullscreenOffset();
        watchVICA();
        scheduleStartupMaximizes();

        ["VAMinimize", "VAWillMinimize"].forEach(function (eventName) {
          document.addEventListener(eventName, blockMinimize, true);
          window.addEventListener(eventName, blockMinimize, true);
        });

        window.addEventListener("load", forceVICAFullPage);
        window.addEventListener("resize", function () {
          syncVICAFullscreenOffset();
          forceVICAFullPage();
        });

        window.setTimeout(function () {
          if (!ready && !failed && loaderText) {
            loaderText.textContent =
              "The chat is taking longer than expected to connect.";
          }
        }, 12000);
      }

      window.vicaScriptLoaded = function () {
        scheduleStartupMaximizes();
        patchVICAShadowLayout();
        window.setTimeout(hideLoader, 500);
      };

      window.vicaScriptFailed = function () {
        failed = true;
        loader = loader || document.getElementById("chat-loader");
        loaderSpinner = loaderSpinner || document.getElementById("chat-loader-spinner");
        loaderText = loaderText || document.getElementById("chat-loader-text");
        if (loader) {
          loader.setAttribute("role", "alert");
        }
        if (loaderSpinner) {
          loaderSpinner.hidden = true;
        }
        if (loaderText) {
          loaderText.textContent =
            "ViCA could not load. Confirm that https://tayguangsheng.github.io is allowlisted in the ViCA Admin Console, then refresh the page.";
        }
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initialiseVICAFrame, { once: true });
      } else {
        initialiseVICAFrame();
      }
    }());
  </script>

  <script
    async
    type="text/javascript"
    src="https://webchat.vica.gov.sg/static/js/chat.js"
    referrerpolicy="origin"
    onload="window.vicaScriptLoaded()"
    onerror="window.vicaScriptFailed()"
  ></script>
</body>
</html>
